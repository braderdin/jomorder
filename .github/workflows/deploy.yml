# Start: Fasa 12 - Production CI/CD Core (GitHub Actions)
# Trigger: push ke branch "main"
# Langkah: type-check (tsc --noEmit) -> deploy Cloudflare Workers via wrangler-action
name: Deploy JomOrder Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Kekangan token CI: elak concurrency bertindih (double deploy)
concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: TypeCheck and Deploy
    runs-on: ubuntu-latest
    # Had masa keras untuk mengelak CI hang (Fasal 9 background hygiene)
    timeout-minutes: 15

    steps:
      # 1. Checkout kod sumber
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Pasang Node.js (LTS stabil)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies (CI clean)
      - name: Install Dependencies
        run: npm ci

      # 4. Type Safety Gate (Fasal 11 - strict tsc --noEmit, 0 error wajib)
      - name: Type Validation (tsc --noEmit)
        run: npx tsc --noEmit

      # 5. Deploy ke Cloudflare Workers (wrangler-action)
      #    CLOUDFLARE_API_TOKEN di-set sebagai GitHub Secret (Settings > Secrets)
      #    Map CLOUDFLARE_DEPLOY_TOKEN -> CLOUDFLARE_API_TOKEN (Fasal 11/16).
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_DEPLOY_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --minify
        env:
          # Pembolehubah bukan-rahsia (placeholder generic, Fasal 11 privacy)
          ADMIN_TELEGRAM_ID: "YOUR_ADMIN_ID"
          R2_PUBLIC_URL: "YOUR_PUBLIC_URL"

      # 6. Apply pending SQL migrations (Fasa 18 Migration Automation)
      #    Setiap fail DDL guna guard idempoten (IF NOT EXISTS / DROP IF EXISTS /
      #    ON CONFLICT DO NOTHING) supaya re-run selamat tanpa ralat.
      #    Langkau jika secret SUPABASE_DB_URL tiada (local/test CI tak pecah).
      - name: Apply SQL Migrations (Idempotent)
        if: ${{ env.SUPABASE_DB_URL != '' }}
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -u
          # Phase 21 (Fasal 11 IPv4 Pooling Mandate): paksa append
          # session pooler param ?pgbouncer=false ke DDL connection supaya
          # migration write tidak dihalang transaction pooling Supabase.
          DB_URL="${SUPABASE_DB_URL}"
          case "$DB_URL" in
            *"?"*) DB_URL="${DB_URL}&pgbouncer=false" ;;
            *)     DB_URL="${DB_URL}?pgbouncer=false" ;;
          esac
          for f in \
            src/db/migrations/001_security_hardening.sql \
            src/db/migrations/002_campaign_discounts.sql \
            src/db/migrations/003_premium_check_constraint.sql \
            src/db/migrations/025_founder_demo_shop.sql \
            src/db/analytics.sql \
            src/db/seed.sql ; do
            echo "Applying $f (pgbouncer=false forced) ..."
            psql "$DB_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      # 7. Force Webhook Register pasca-deploy (Phase 60 automation)
      #    Zero manual step: daftar webhook + sync 30 command natif terus.
      #    Baca token dari GitHub Secrets (tiada hardcode ke repo).
      - name: Force Webhook Register
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          X_TELEGRAM_BOT_API_SECRET_TOKEN: ${{ secrets.X_TELEGRAM_BOT_API_SECRET_TOKEN }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: |
          set -u
          bash bin/force-webhook-register.sh

      # 8. Smoke test pasca-deploy (Fasal 10 harmonized 405/403 = PASS)
      - name: Post-Deploy Smoke Ping
        run: |
          echo "Triggering harmonized smoke check..."
          curl -s -o /dev/null -w "GET / (expect 200/405): %{http_code}\n" https://jomorder-worker.braderdin006.workers.dev/ || true
# End: Fasa 12 - Production CI/CD Core
