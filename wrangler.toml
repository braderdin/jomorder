# Start: JomOrder Fasa 3 - Cloudflare Worker Blueprint
# Fasal 11 (wrangler.toml consistency) - bindings selaras 1:1 dengan src/types.ts Env
name = "jomorder-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Variables (bukan-rahsia, selamat dibaca awam)
[vars]
SUPABASE_URL = "https://YOUR-PROJECT.supabase.co"
SUPABASE_ANON_KEY = "YOUR-ANON-KEY"
UPSTASH_REDIS_REST_URL = "https://YOUR-UPSTASH-ENDPOINT.upstash.io"

# Start: Fasa 9 - Environment Hardening (align 1:1 dengan .dev.vars)
# Hapus hardcoded config: admin gateway + R2 public CDN disuntik dynamically.
ADMIN_TELEGRAM_ID = "YOUR_ADMIN_ID"
CHIP_BESAR_TELEGRAM_ID = "YOUR_CHIP_BESAR_ID"
R2_PUBLIC_URL = "YOUR_PUBLIC_URL"
# End: Fasa 12 - Config Alignment (generic placeholder, privacy secure Fasal 11)

# Start: Phase 29 - Public Stats Cache TTL Alignment (Fasal 11 env alignment)
# PUBLIC_STATS_TTL=60 selaras dengan analytics.ts PUBLIC_STATS_TTL konstant.
PUBLIC_STATS_TTL = 60
# End: Phase 29 - Public Stats Cache TTL Alignment

# Secrets (rahsia - isi guna: npx wrangler secret put <NAME>)
# TELEGRAM_BOT_TOKEN
# X_TELEGRAM_BOT_API_SECRET_TOKEN
# SUPABASE_SERVICE_ROLE_KEY
# UPSTASH_REDIS_REST_TOKEN

# R2 Bucket (Fasal 8 media optimization) - optional
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "jomorder-assets"

# KV Namespace (Fasal 7 Strategy 2 fallback state) - optional
[[kv_namespaces]]
binding = "MERCHANT_STATE"
id = "REPLACE-WITH-KV-ID"

# Observability
[observability]
enabled = true
# End: JomOrder Fasa 3 - Cloudflare Worker Blueprint