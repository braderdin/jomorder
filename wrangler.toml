# Start: Phase 42 - Secrets Provisioning (Fasal 15 - TIADA kunci rahsia di sini)
# Semua secret di bawah WAJIB di-provision ke Cloudflare guna:
#   npx wrangler secret put <NAME>
# atau jalankan bin/deploy-worker.sh (auto-provision KEEMPAT-EMPAT secret).
# - TELEGRAM_BOT_TOKEN          (rahsia - jangan tulis nilai di sini)
# - X_TELEGRAM_BOT_API_SECRET_TOKEN (rahsia - jangan tulis nilai di sini)
# - SUPABASE_SERVICE_ROLE_KEY   (rahsia - jangan tulis nilai di sini)
# - UPSTASH_REDIS_REST_TOKEN    (rahsia - jangan tulis nilai di sini)
# End: Phase 42 - Secrets Provisioning

# R2 Bucket (Fasal 8 media optimization) - optional
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "jomorder-assets"

# KV Namespace (Fasal 7 Strategy 2 fallback state) - optional
# Start: Phase 41 Deploy Blocker Fix - KV ID belum di-provision, comment out sementara
# Untuk re-aktifkan: ganti ID di bawah dengan KV namespace ID sebenar dari Cloudflare dashboard.
# [[kv_namespaces]]
# binding = "MERCHANT_STATE"
# id = "REPLACE-WITH-KV-ID"
# End: Phase 41 Deploy Blocker Fix

# Start: Phase 51 - Cron Triggers (Fasal 10 secret guard endpoints)
# Timer harian tembak endpoint POST dengan header X-Telegram-Bot-Api-Secret-Token.
# - coupon-sweep: matikan kupon tamat + notify peniaga (tengah malam UTC)
# - daily-digest: ringkasan harian peniaga 9PG MYT = 1AM UTC
# - maintenance: sentinel self-heal drift recovery (setiap 15 minit)
[triggers]
crons = [
  "0 0 * * *",
  "0 1 * * *",
  "*/15 * * * *"
]
# End: Phase 51 - Cron Triggers

# Observability
[observability]
enabled = true
# End: JomOrder Fasa 3 - Cloudflare Worker Blueprint
